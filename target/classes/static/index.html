<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>COER FAQ Bot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #080816, #0e0e23, #112642);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .chat-container {
        width: 100%;
        max-width: 650px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      }

      .chat-header {
        background: linear-gradient(90deg, #0f3460, #533483);
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .header-icon {
        width: 48px;
        height: 48px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }

      .header-text h1 {
        color: white;
        font-size: 18px;
        font-weight: 600;
      }

      .header-text p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        margin-top: 2px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      #chat-box {
        height: 420px;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }

      #chat-box::-webkit-scrollbar {
        width: 4px;
      }
      #chat-box::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .msg {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .user {
        background: linear-gradient(135deg, #0f3460, #533483);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .bot {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.9);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .bot-name {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
        margin-left: 4px;
      }

      .welcome-msg {
        text-align: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 13px;
        margin: auto;
      }

      .welcome-msg .emoji {
        font-size: 32px;
        display: block;
        margin-bottom: 8px;
      }

      .suggestions {
        display: flex;
        justify-content: stretch;
        gap: 10px;
        padding: 12px 24px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .suggestion-btn {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        padding: 10px 8px;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex: 1;
      }

      .suggestion-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: white;
      }

      .input-area {
        padding: 16px 24px 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      #input-row {
        display: flex;
        gap: 10px;
        align-items: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 8px 8px 8px 16px;
        transition: all 0.2s;
      }

      #input-row:focus-within {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
      }

      #user-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font-size: 14px;
        font-family: "Segoe UI", sans-serif;
      }

      #user-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      button {
        width: 38px;
        height: 38px;
        background: linear-gradient(135deg, #0f3460, #533483);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
        flex-shrink: 0;
      }

      button:hover {
        transform: scale(1.05);
      }

      button svg {
        width: 16px;
        height: 16px;
        fill: white;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="header-icon">🎓</div>
        <div class="header-text">
          <h1>COER FAQ Assistant</h1>
          <p><span class="status-dot"></span>Online — ask me anything</p>
        </div>
      </div>

      <div id="chat-box">
        <div class="welcome-msg">
          <span class="emoji">👋</span>
          Hi! I can answer questions about admissions, hostel, exams, and more.
        </div>
      </div>

      <div class="suggestions">
        <button class="suggestion-btn" onclick="askSuggestion('hostel fees')">
          🏠 Hostel
        </button>
        <button
          class="suggestion-btn"
          onclick="askSuggestion('admission process')"
        >
          📋 Admissions
        </button>
        <button class="suggestion-btn" onclick="askSuggestion('exam schedule')">
          📅 Exam
        </button>
        <button class="suggestion-btn" onclick="askSuggestion('transcript')">
          📄 Transcript
        </button>
      </div>

      <div class="input-area">
        <div id="input-row">
          <input
            id="user-input"
            placeholder="Type your question..."
            onkeydown="if (event.key === 'Enter') sendMessage();"
          />
          <button onclick="sendMessage()">
            <svg viewBox="0 0 24 24">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
